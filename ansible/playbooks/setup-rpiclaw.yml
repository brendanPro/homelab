- name: Préparer le RPi claw
  hosts: rpiclaw
  become: true

  tasks:
    - name: Mettre à jour les paquets apt
      apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600

    - name: Installer les dépendances de base
      apt:
        name:
          - curl
          - git
          - ca-certificates
          - python3
          - python3-pip
          - unzip
          - chromium
          - chromium-driver
        state: present

    - name: Ajouter le dépôt NodeSource pour Node.js {{ node_version }}
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_{{ node_version }}.x | bash -
      args:
        creates: /etc/apt/sources.list.d/nodesource.list

    - name: Installer Node.js
      apt:
        name: nodejs
        state: present
        update_cache: true

    - name: Vérifier Node.js
      command: node --version
      register: node_out
      changed_when: false

    - name: Afficher la version Node.js
      debug:
        msg: "✅ Node.js {{ node_out.stdout }} installé"

    - name: Ajouter la clé GPG Google Cloud
      shell: |
        curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg \
          | gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
      args:
        creates: /usr/share/keyrings/cloud.google.gpg

    - name: Ajouter le dépôt Google Cloud SDK
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main"
        state: present
        filename: google-cloud-sdk

    - name: Installer Google Cloud CLI
      apt:
        name: google-cloud-cli
        state: present
        update_cache: true

    - name: Vérifier gcloud
      command: gcloud --version
      register: gcloud_out
      changed_when: false

    - name: Afficher la version gcloud
      debug:
        msg: "✅ {{ gcloud_out.stdout_lines[0] }} installé"
